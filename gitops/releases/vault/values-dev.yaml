global:
  enabled: true
  tlsDisable: true

injector:
  enabled: true
  replicas: 1

server:
  image:
    repository: hashicorp/vault
    tag: "1.19.0"

  serviceAccount:
    create: true
    name: vault

  logLevel: info

  extraEnvironmentVars:
    AWS_REGION: "ap-southeast-1"
    AWS_DEFAULT_REGION: "ap-southeast-1"
    AWS_SHARED_CREDENTIALS_FILE: "/aws/credentials/credentials"
    AWS_PROFILE: "default"
    AWS_EC2_METADATA_DISABLED: "true"

  volumes:
    - name: rolesanywhere-cert
      secret:
        secretName: vault-rolesanywhere-cert
        defaultMode: 0444
    - name: aws-credentials
      emptyDir: {}

  volumeMounts:
    - name: rolesanywhere-cert
      mountPath: /vault/userconfig/rolesanywhere
      readOnly: true
    - name: aws-credentials
      mountPath: /aws/credentials
      readOnly: true

  extraInitContainers:
    - name: rolesanywhere-credential-helper
      image: public.ecr.aws/rolesanywhere/credential-helper:1.8.3-arm64-2026.05.13.19.39
      imagePullPolicy: IfNotPresent
      restartPolicy: Always
      env:
        - name: AWS_SHARED_CREDENTIALS_FILE
          value: /aws/credentials/credentials
      args:
        - update
        - --certificate
        - /vault/userconfig/rolesanywhere/tls.crt
        - --private-key
        - /vault/userconfig/rolesanywhere/tls.key
        - --trust-anchor-arn
        - arn:aws:rolesanywhere:ap-southeast-1:637423223528:trust-anchor/181e3f00-1651-419d-8f29-16715addb3f3
        - --profile-arn
        - arn:aws:rolesanywhere:ap-southeast-1:637423223528:profile/2c1f5435-3a01-4f9b-89d1-30347d783c83
        - --role-arn
        - arn:aws:iam::637423223528:role/extreme-lab-dev-vault
        - --profile
        - default
      startupProbe:
        exec:
          command:
            - /usr/local/bin/aws_signing_helper
            - credential-process
            - --certificate
            - /vault/userconfig/rolesanywhere/tls.crt
            - --private-key
            - /vault/userconfig/rolesanywhere/tls.key
            - --trust-anchor-arn
            - arn:aws:rolesanywhere:ap-southeast-1:637423223528:trust-anchor/181e3f00-1651-419d-8f29-16715addb3f3
            - --profile-arn
            - arn:aws:rolesanywhere:ap-southeast-1:637423223528:profile/2c1f5435-3a01-4f9b-89d1-30347d783c83
            - --role-arn
            - arn:aws:iam::637423223528:role/extreme-lab-dev-vault
        initialDelaySeconds: 2
        periodSeconds: 10
        timeoutSeconds: 30
        failureThreshold: 18
      livenessProbe:
        exec:
          command:
            - /usr/local/bin/aws_signing_helper
            - credential-process
            - --certificate
            - /vault/userconfig/rolesanywhere/tls.crt
            - --private-key
            - /vault/userconfig/rolesanywhere/tls.key
            - --trust-anchor-arn
            - arn:aws:rolesanywhere:ap-southeast-1:637423223528:trust-anchor/181e3f00-1651-419d-8f29-16715addb3f3
            - --profile-arn
            - arn:aws:rolesanywhere:ap-southeast-1:637423223528:profile/2c1f5435-3a01-4f9b-89d1-30347d783c83
            - --role-arn
            - arn:aws:iam::637423223528:role/extreme-lab-dev-vault
        periodSeconds: 60
        timeoutSeconds: 30
        failureThreshold: 3
      volumeMounts:
        - name: rolesanywhere-cert
          mountPath: /vault/userconfig/rolesanywhere
          readOnly: true
        - name: aws-credentials
          mountPath: /aws/credentials
      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          cpu: 200m
          memory: 128Mi

  extraContainers: []

  affinity: |
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: vault
                app.kubernetes.io/instance: "vault"
                component: server
            topologyKey: kubernetes.io/hostname

  ha:
    enabled: true
    replicas: 3

    raft:
      enabled: true
      setNodeId: true

      config: |
        ui = true
        cluster_name = "vault-extreme-lab"

        listener "tcp" {
          address = "[::]:8200"
          cluster_address = "[::]:8201"
          tls_disable = "true"
        }

        storage "raft" {
          path = "/vault/data"

          retry_join {
            leader_api_addr = "http://vault-0.vault-internal:8200"
          }

          retry_join {
            leader_api_addr = "http://vault-1.vault-internal:8200"
          }

          retry_join {
            leader_api_addr = "http://vault-2.vault-internal:8200"
          }
        }

        seal "awskms" {
          region     = "ap-southeast-1"
          kms_key_id = "alias/extreme-lab-dev-vault-auto-unseal"
        }

        service_registration "kubernetes" {}

  dataStorage:
    enabled: true
    size: 10Gi
    storageClass: ceph-block
    accessMode: ReadWriteOnce

  auditStorage:
    enabled: true
    size: 5Gi
    storageClass: ceph-block
    accessMode: ReadWriteOnce

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

ui:
  enabled: true
  serviceType: ClusterIP
