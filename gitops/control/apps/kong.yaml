apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kong
  namespace: argocd
spec:
  project: platform
  sources:
    - repoURL: https://charts.konghq.com
      chart: ingress
      targetRevision: "0.24.0"
      helm:
        releaseName: kong
        valueFiles:
          - $values/gitops/infra/kong/dev.yaml
    - repoURL: git@github.com:Miracle-1331/extreme-k8s-lab.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: kong
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
      - SkipCRDs=true
