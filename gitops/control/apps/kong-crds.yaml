apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kong-crds
  namespace: argocd
spec:
  project: platform
  source:
    repoURL: https://github.com/Kong/charts.git
    targetRevision: ingress-0.24.0
    path: charts/kong/crds
  destination:
    server: https://kubernetes.default.svc
    namespace: kong
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
