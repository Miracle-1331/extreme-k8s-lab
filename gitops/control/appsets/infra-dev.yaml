apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-infra-dev
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - name: cert-manager
            repoURL: https://charts.jetstack.io
            chart: cert-manager
            targetRevision: "v1.20.2"
            namespace: cert-manager
            releaseName: cert-manager
            valuesPath: gitops/releases/cert-manager/values-dev.yaml
            createNamespace: "false"
            skipCRDs: "false"
            wave: "10"

          - name: vault
            repoURL: https://helm.releases.hashicorp.com
            chart: vault
            targetRevision: "0.32.0"
            namespace: vault
            releaseName: vault
            valuesPath: gitops/releases/vault/values-dev.yaml
            createNamespace: "false"
            skipCRDs: "false"
            wave: "10"

          - name: rook-ceph
            repoURL: https://charts.rook.io/release
            chart: rook-ceph
            targetRevision: "v1.16.6"
            namespace: rook-ceph
            releaseName: rook-ceph
            valuesPath: gitops/releases/rook-ceph/values-dev.yaml
            createNamespace: "false"
            skipCRDs: "false"
            wave: "10"

          - name: istio-base
            repoURL: https://istio-release.storage.googleapis.com/charts
            chart: base
            targetRevision: "1.30.1"
            namespace: istio-system
            releaseName: istio-base
            valuesPath: gitops/releases/istio-base/values-dev.yaml
            createNamespace: "false"
            skipCRDs: "false"
            wave: "10"

          - name: istiod
            repoURL: https://istio-release.storage.googleapis.com/charts
            chart: istiod
            targetRevision: "1.30.1"
            namespace: istio-system
            releaseName: istiod
            valuesPath: gitops/releases/istiod/values-dev.yaml
            createNamespace: "false"
            skipCRDs: "false"
            wave: "15"

          - name: istio-cni
            repoURL: https://istio-release.storage.googleapis.com/charts
            chart: cni
            targetRevision: "1.30.1"
            namespace: istio-system
            releaseName: istio-cni
            valuesPath: gitops/releases/istio-cni/values-dev.yaml
            createNamespace: "false"
            skipCRDs: "false"
            wave: "15"

          - name: istio-ztunnel
            repoURL: https://istio-release.storage.googleapis.com/charts
            chart: ztunnel
            targetRevision: "1.30.1"
            namespace: istio-system
            releaseName: ztunnel
            valuesPath: gitops/releases/istio-ztunnel/values-dev.yaml
            createNamespace: "false"
            skipCRDs: "false"
            wave: "15"

          - name: vault-secrets-operator
            repoURL: https://helm.releases.hashicorp.com
            chart: vault-secrets-operator
            targetRevision: "1.4.0"
            namespace: vault-secrets-operator
            releaseName: vault-secrets-operator
            valuesPath: gitops/releases/vault-secrets-operator/values-dev.yaml
            createNamespace: "true"
            skipCRDs: "false"
            wave: "10"

          - name: kong
            repoURL: https://charts.konghq.com
            chart: ingress
            targetRevision: "0.24.0"
            namespace: kong
            releaseName: kong
            valuesPath: gitops/releases/kong/values-dev.yaml
            createNamespace: "false"
            skipCRDs: "true"
            wave: "10"

          - name: external-dns
            repoURL: https://kubernetes-sigs.github.io/external-dns/
            chart: external-dns
            targetRevision: "1.21.1"
            namespace: external-dns
            releaseName: external-dns
            valuesPath: gitops/releases/external-dns/values-dev.yaml
            createNamespace: "false"
            skipCRDs: "false"
            wave: "10"

          - name: cloudnative-pg
            repoURL: https://cloudnative-pg.github.io/charts
            chart: cloudnative-pg
            targetRevision: "0.28.2"
            namespace: cnpg-system
            releaseName: cloudnative-pg
            valuesPath: gitops/releases/cloudnative-pg/values-dev.yaml
            createNamespace: "true"
            skipCRDs: "false"
            wave: "10"

          - name: kyverno
            repoURL: https://kyverno.github.io/kyverno/
            chart: kyverno
            targetRevision: "3.8.1"
            namespace: kyverno
            releaseName: kyverno
            valuesPath: gitops/releases/kyverno/values-dev.yaml
            createNamespace: "true"
            skipCRDs: "false"
            wave: "10"

          - name: falco
            repoURL: https://falcosecurity.github.io/charts
            chart: falco
            targetRevision: "9.0.0"
            namespace: falco
            releaseName: falco
            valuesPath: gitops/releases/falco/values-dev.yaml
            createNamespace: "true"
            skipCRDs: "false"
            wave: "10"

          - name: falco-k8saudit
            repoURL: https://falcosecurity.github.io/charts
            chart: falco
            targetRevision: "9.0.0"
            namespace: falco
            releaseName: falco-k8saudit
            valuesPath: gitops/releases/falco-k8saudit/values-dev.yaml
            createNamespace: "true"
            skipCRDs: "false"
            wave: "10"

          # - name: observability-grafana
          #   repoURL: https://grafana.github.io/helm-charts
          #   chart: grafana
          #   targetRevision: "10.2.0"
          #   namespace: observability
          #   releaseName: grafana
          #   valuesPath: gitops/releases/grafana/values-dev.yaml
          #   createNamespace: "false"
          #   wave: "10"

          # - name: observability-loki
          #   repoURL: https://grafana.github.io/helm-charts
          #   chart: loki
          #   targetRevision: "6.46.0"
          #   namespace: observability
          #   releaseName: loki
          #   valuesPath: gitops/releases/loki/values-dev.yaml
          #   createNamespace: "false"
          #   wave: "10"

          # - name: observability-alloy
          #   repoURL: https://grafana.github.io/helm-charts
          #   chart: alloy
          #   targetRevision: "1.4.0"
          #   namespace: observability
          #   releaseName: alloy
          #   valuesPath: gitops/releases/alloy/values-dev.yaml
          #   createNamespace: "false"
          #   wave: "10"

          # - name: observability-mimir
          #   repoURL: https://grafana.github.io/helm-charts
          #   chart: mimir-distributed
          #   targetRevision: "6.0.4"
          #   namespace: observability
          #   releaseName: mimir
          #   valuesPath: gitops/releases/mimir/values-dev.yaml
          #   createNamespace: "false"
          #   wave: "10"

          # - name: observability-tempo
          #   repoURL: https://grafana.github.io/helm-charts
          #   chart: tempo
          #   targetRevision: "1.24.3"
          #   namespace: observability
          #   releaseName: tempo
          #   valuesPath: gitops/releases/tempo/values-dev.yaml
          #   createNamespace: "false"
          #   wave: "10"
  template:
    metadata:
      name: "{{.name}}"
      namespace: argocd
      annotations:
        argocd.argoproj.io/sync-wave: "{{.wave}}"
    spec:
      project: platform

      sources:
        - repoURL: "{{.repoURL}}"
          chart: "{{.chart}}"
          targetRevision: "{{.targetRevision}}"
          helm:
            releaseName: "{{.releaseName}}"
            valueFiles:
              - $values/{{.valuesPath}}

        - repoURL: git@github.com:Miracle-1331/extreme-k8s-lab.git
          targetRevision: main
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace={{.createNamespace}}
          - ServerSideApply=true
          - SkipCRDs={{.skipCRDs}}
