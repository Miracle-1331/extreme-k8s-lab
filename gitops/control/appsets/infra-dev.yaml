apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-infra-dev
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - name: cert-manager
            repoURL: https://charts.jetstack.io
            chart: jetstack/cert-manager
            targetRevision: "v1.20.2"
            namespace: cert-manager
            releaseName: cert-manager
            valuesPath: infra/cert-manager/dev.yaml

          # - name: vault
          #   repoURL: https://helm.releases.hashicorp.com
          #   chart: vault
          #   targetRevision: "0.32.0"
          #   namespace: vault
          #   releaseName: vault
          #   valuesPath: infra/vault/dev.yaml

          # - name: observability-grafana
          #   repoURL: https://grafana.github.io/helm-charts
          #   chart: grafana
          #   targetRevision: "10.2.0"
          #   namespace: observability
          #   releaseName: grafana
          #   valuesPath: infra/grafana/dev.yaml

          # - name: observability-loki
          #   repoURL: https://grafana.github.io/helm-charts
          #   chart: loki
          #   targetRevision: "6.46.0"
          #   namespace: observability
          #   releaseName: loki
          #   valuesPath: infra/loki/dev.yaml

          # - name: observability-alloy
          #   repoURL: https://grafana.github.io/helm-charts
          #   chart: alloy
          #   targetRevision: "1.4.0"
          #   namespace: observability
          #   releaseName: alloy
          #   valuesPath: infra/alloy/dev.yaml

          # - name: observability-mimir
          #   repoURL: https://grafana.github.io/helm-charts
          #   chart: mimir-distributed
          #   targetRevision: "6.0.4"
          #   namespace: observability
          #   releaseName: mimir
          #   valuesPath: infra/mimir/dev.yaml

          # - name: observability-tempo
          #   repoURL: https://grafana.github.io/helm-charts
          #   chart: tempo
          #   targetRevision: "1.24.3"
          #   namespace: observability
          #   releaseName: tempo
          #   valuesPath: infra/tempo/dev.yaml
  template:
    metadata:
      name: "{{.name}}"
      namespace: argocd
    spec:
      project: platform

      sources:
        - repoURL: "{{.repoURL}}"
          chart: "{{.chart}}"
          targetRevision: "{{.targetRevision}}"
          helm:
            releaseName: "{{.releaseName}}"
            valueFiles:
              - $values/{{.valuesPath}}

        - repoURL: https://gitea.devops.osswave.kr/platform/gitops.git
          targetRevision: main
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
