apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  description: "Platform apps (monitoring, toolchain, etc.)"
  sourceRepos:
    - git@github.com:Miracle-1331/*
    - https://charts.jetstack.io
    - https://argoproj.github.io/argo-helm
    - https://helm.releases.hashicorp.com
    - https://grafana.github.io/helm-charts
    - https://prometheus-community.github.io/helm-charts
    - https://open-telemetry.github.io/opentelemetry-helm-charts
    - https://charts.rook.io/release
    - https://istio-release.storage.googleapis.com/charts
    - https://charts.konghq.com
    - https://github.com/Kong/charts.git
    - https://github.com/kubernetes-sigs/gateway-api.git
    - https://kubernetes-sigs.github.io/external-dns/
    - https://cloudnative-pg.github.io/charts
    - https://kyverno.github.io/kyverno/
  destinations:
    - namespace: "*"
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
