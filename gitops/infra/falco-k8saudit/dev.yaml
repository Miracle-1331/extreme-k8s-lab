driver:
  enabled: false

collectors:
  enabled: false

controller:
  kind: deployment
  deployment:
    replicas: 1

falcoctl:
  artifact:
    install:
      enabled: true
    follow:
      enabled: true
  config:
    artifact:
      install:
        resolveDeps: true
        refs: ["k8saudit-rules:0"]
      follow:
        refs: ["k8saudit-rules:0"]

services:
  - name: k8saudit-webhook
    type: NodePort
    ports:
      - port: 9765
        nodePort: 30007
        protocol: TCP

falco:
  json_output: true
  json_include_output_property: true
  log_level: info
  priority: warning
  time_format_iso_8601: true
  rules_files:
    - /etc/falco/k8s_audit_rules.yaml
    - /etc/falco/rules.d
  plugins:
    - name: k8saudit
      library_path: libk8saudit.so
      init_config: ""
      open_params: "http://:9765/k8s-audit"
    - name: json
      library_path: libjson.so
      init_config: ""
  load_plugins: [k8saudit, json]

customRules:
  k8s-audit-local-overrides.yaml: |-
    - list: trusted_secret_readers
      items:
        - system:serviceaccount:argocd:argocd-application-controller
        - system:serviceaccount:kyverno:kyverno-admission-controller
        - system:serviceaccount:kyverno:kyverno-cleanup-controller
        - system:serviceaccount:cert-manager:cert-manager
        - system:serviceaccount:cert-manager:cert-manager-cainjector
        - system:serviceaccount:istio-system:istiod
        - system:serviceaccount:cnpg-system:cloudnative-pg
        - system:serviceaccount:vault-secrets-operator:vault-secrets-operator-controller-manager

    - rule: K8s Secret Get Successfully
      enabled: false
      override:
        enabled: replace

    - rule: K8s Secret Get Successfully By Untrusted Principal
      desc: Detect successful secret reads by non-trusted service accounts
      condition: >
        ka.target.resource = secrets and
        ka.verb = get and
        ka.response.code = 200 and
        not ka.user.name in (trusted_secret_readers)
      output: >
        Untrusted principal read Kubernetes Secret
        (user=%ka.user.name secret=%ka.target.name ns=%ka.target.namespace
        decision=%ka.auth.decision reason=%ka.auth.reason)
      priority: WARNING
      source: k8s_audit
      tags: [k8s, secrets, rbac]

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
