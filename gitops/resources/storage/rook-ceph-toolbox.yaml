apiVersion: apps/v1
kind: Deployment
metadata:
  name: rook-ceph-tools
  namespace: rook-ceph
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rook-ceph-tools
  template:
    metadata:
      labels:
        app: rook-ceph-tools
    spec:
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: rook-ceph-tools
          image: quay.io/ceph/ceph:v18.2.7
          command:
            - /bin/bash
            - -c
            - |
              # Build ceph.conf from mon-endpoints configmap and fsid secret
              MONS=$(grep -oE '[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+:[0-9]+' /etc/rook/mon-endpoints | paste -sd',' -)
              cat > /etc/ceph/ceph.conf <<EOF
              [global]
              auth cluster required = cephx
              auth service required = cephx
              auth client required = cephx
              fsid = ${ROOK_FSID}
              mon_host = ${MONS}
              EOF
              # Keyring is volume-mounted directly from the secret
              cp /var/rook-keyring/keyring /etc/ceph/keyring
              exec sleep infinity
          env:
            - name: ROOK_FSID
              valueFrom:
                secretKeyRef:
                  name: rook-ceph-mon
                  key: fsid
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - mountPath: /etc/ceph
              name: ceph-config
            - mountPath: /etc/rook
              name: mon-endpoint-volume
            - mountPath: /var/rook-keyring
              name: admin-keyring
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: mon-endpoint-volume
          configMap:
            name: rook-ceph-mon-endpoints
            items:
              - key: data
                path: mon-endpoints
        - name: ceph-config
          emptyDir: {}
        - name: admin-keyring
          secret:
            secretName: rook-ceph-admin-keyring
