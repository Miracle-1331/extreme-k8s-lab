apiVersion: v1
kind: Namespace
metadata:
  name: mesh-demo
  labels:
    istio.io/dataplane-mode: ambient
    gateway-access: public

    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted

    platform.merveilles.org/tier: app
    platform.merveilles.org/owner: platform
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: namespace-quota
  namespace: mesh-demo
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 4Gi
    limits.cpu: "4"
    limits.memory: 8Gi
    pods: "30"
    services: "20"
    configmaps: "50"
    secrets: "50"
    persistentvolumeclaims: "10"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: default-container-limits
  namespace: mesh-demo
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 50m
        memory: 64Mi
      default:
        cpu: 500m
        memory: 512Mi
      min:
        cpu: 10m
        memory: 32Mi
      max:
        cpu: "1"
        memory: 1Gi
