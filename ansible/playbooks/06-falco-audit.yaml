# ansible/playbooks/06-falco-audit.yaml
#
# Configures the kube-apiserver static pod to ship audit events to Falco's
# k8saudit webhook (NodePort 30007 on the control-plane node).
#
# Idempotent: uses Python to parse and patch the YAML directly, so
# indentation is always correct and re-runs are safe.

- name: Configure kube-apiserver audit webhook for Falco k8saudit
  hosts: control_plane
  become: true

  vars:
    audit_policy_dest: /etc/kubernetes/audit-policy.yaml
    audit_webhook_dest: /etc/kubernetes/audit-webhook.yaml
    apiserver_manifest: /etc/kubernetes/manifests/kube-apiserver.yaml

  tasks:
    - name: Get control-plane vzNAT IP
      ansible.builtin.shell: |
        hostname -I | tr ' ' '\n' | grep '^192\.168\.105\.' | head -n1
      register: cp_ip
      changed_when: false

    - name: Copy audit policy to control plane
      ansible.builtin.copy:
        src: ../files/audit-policy.yaml
        dest: "{{ audit_policy_dest }}"
        mode: "0600"

    - name: Write audit webhook config
      ansible.builtin.copy:
        dest: "{{ audit_webhook_dest }}"
        mode: "0600"
        content: |
          apiVersion: v1
          kind: Config
          clusters:
            - name: falco-k8saudit
              cluster:
                server: http://{{ cp_ip.stdout }}:30007/k8s-audit
          contexts:
            - context:
                cluster: falco-k8saudit
                user: ""
              name: default
          current-context: default
          preferences: {}
          users: []

    - name: Patch kube-apiserver manifest via Python (idempotent, correct indentation)
      ansible.builtin.script:
        cmd: /dev/stdin
        executable: python3
      args:
        stdin: |
          import sys, re

          path = '/etc/kubernetes/manifests/kube-apiserver.yaml'
          with open(path) as f:
              content = f.read()

          changed = False

          # --- audit flags in command ---
          audit_flags = [
              '    - --audit-policy-file=/etc/kubernetes/audit-policy.yaml',
              '    - --audit-webhook-config-file=/etc/kubernetes/audit-webhook.yaml',
              '    - --audit-webhook-batch-max-wait=5s',
          ]
          if '--audit-policy-file' not in content:
              content = content.replace(
                  '    - kube-apiserver\n',
                  '    - kube-apiserver\n' + '\n'.join(audit_flags) + '\n'
              )
              changed = True

          # --- volumeMounts ---
          mount_entries = (
              '    - mountPath: /etc/kubernetes/audit-policy.yaml\n'
              '      name: audit-policy\n'
              '      readOnly: true\n'
              '    - mountPath: /etc/kubernetes/audit-webhook.yaml\n'
              '      name: audit-webhook\n'
              '      readOnly: true\n'
          )
          if 'audit-policy' not in content:
              content = re.sub(
                  r'(    volumeMounts:\n)',
                  r'\1' + mount_entries,
                  content
              )
              changed = True

          # --- volumes ---
          volume_entries = (
              '  - hostPath:\n'
              '      path: /etc/kubernetes/audit-policy.yaml\n'
              '      type: File\n'
              '    name: audit-policy\n'
              '  - hostPath:\n'
              '      path: /etc/kubernetes/audit-webhook.yaml\n'
              '      type: File\n'
              '    name: audit-webhook\n'
          )
          if 'audit-policy' not in content.split('volumes:')[-1]:
              content = re.sub(
                  r'(  volumes:\n)',
                  r'\1' + volume_entries,
                  content
              )
              changed = True

          with open(path, 'w') as f:
              f.write(content)

          print('changed' if changed else 'ok')
          sys.exit(0)
      register: patch_result
      changed_when: "'changed' in patch_result.stdout"

    - name: Wait for kube-apiserver to become healthy after restart
      ansible.builtin.command: >
        kubectl --kubeconfig=/etc/kubernetes/admin.conf
        get --raw /healthz
      register: apiserver_health
      until: apiserver_health.stdout == "ok"
      retries: 30
      delay: 5
      changed_when: false
      when: patch_result.changed

    - name: Confirm audit webhook is configured
      ansible.builtin.command: >
        grep audit-webhook-config-file {{ apiserver_manifest }}
      register: audit_check
      changed_when: false

    - name: Print audit configuration status
      ansible.builtin.debug:
        msg: "Audit webhook configured: {{ audit_check.stdout }}"
