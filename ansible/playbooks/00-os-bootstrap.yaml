# ansible/playbooks/00-os-bootstrap.yaml
- name: Bootstrap Kubernetes OS requirements
  hosts: k8s
  become: true
  tasks:
    - name: Disable swap
      ansible.builtin.command: swapoff -a
      changed_when: false

    - name: Remove swap from fstab
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^([^#].*\sswap\s.*)$'
        replace: '# \1'

    - name: Load required kernel modules
      ansible.builtin.copy:
        dest: /etc/modules-load.d/k8s.conf
        mode: "0644"
        content: |
          overlay
          br_netfilter

    - name: Modprobe overlay
      ansible.builtin.command: modprobe overlay
      changed_when: false

    - name: Modprobe br_netfilter
      ansible.builtin.command: modprobe br_netfilter
      changed_when: false

    - name: Configure Kubernetes sysctl
      ansible.builtin.copy:
        dest: /etc/sysctl.d/99-kubernetes-cri.conf
        mode: "0644"
        content: |
          net.bridge.bridge-nf-call-iptables = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward = 1

    - name: Apply sysctl
      ansible.builtin.command: sysctl --system
      changed_when: false

    - name: Install chrony
      ansible.builtin.apt:
        name: chrony
        state: present
        update_cache: true

    - name: Disable systemd-timesyncd (conflicts with chrony)
      ansible.builtin.systemd:
        name: systemd-timesyncd
        state: stopped
        enabled: false
      ignore_errors: true

    - name: Configure chrony with makestep for VM clock jumps
      ansible.builtin.copy:
        dest: /etc/chrony/conf.d/makestep.conf
        mode: "0644"
        content: |
          makestep 0.1 -1
      notify: Restart chrony

    - name: Enable and start chrony
      ansible.builtin.systemd:
        name: chrony
        state: started
        enabled: true

  handlers:
    - name: Restart chrony
      ansible.builtin.systemd:
        name: chrony
        state: restarted
