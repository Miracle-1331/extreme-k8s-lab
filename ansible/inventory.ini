[control_plane]
k8s-cp-1 ansible_host=127.0.0.1 ansible_port=53011 ansible_user=miracle

[workers]
k8s-worker-1 ansible_host=127.0.0.1 ansible_port=50180 ansible_user=miracle
k8s-worker-2 ansible_host=127.0.0.1 ansible_port=50182 ansible_user=miracle

[k8s:children]
control_plane
workers

[k8s:vars]
ansible_ssh_private_key_file=~/.lima/_config/user
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
